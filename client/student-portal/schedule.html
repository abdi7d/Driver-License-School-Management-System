<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - DLSM Ethiopia</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/dark-mode.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/auth-guard.js"></script>
</head>
<body class="dashboard-body">
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <img src="../assets/images/logo-DLSM.jpg" alt="DLSM Logo" class="logo-icon" style="height: 32px; width: auto; border-radius: 6px;">
                <span class="logo-text">DLSM</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">📊</span>
                <span class="nav-text">Dashboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-text">My Profile</span>
            </a>
            <a href="schedule.html" class="nav-item active">
                <span class="nav-icon">📅</span>
                <span class="nav-text">Schedule</span>
            </a>
            <a href="progress.html" class="nav-item">
                <span class="nav-icon">📈</span>
                <span class="nav-text">My Progress</span>
            </a>
            <a href="exams.html" class="nav-item">
                <span class="nav-icon">📝</span>
                <span class="nav-text">Exams</span>
            </a>
            <a href="certificate.html" class="nav-item">
                <span class="nav-icon">🎓</span>
                <span class="nav-text">Certificate</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="logoutBtn">
                <span class="nav-icon">🚪</span>
                <span class="nav-text">Logout</span>
            </button>
        </div>
    </aside>

    
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                <div>
                    <h1 class="page-title">My Schedule</h1>
                    <p class="page-subtitle">View your assigned training sessions</p>
                </div>
            </div>
            <div class="topbar-right">
                <div class="user-profile">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <span class="user-name" id="userName">Student</span>
                        <span class="user-role">Student</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-container">
            
            <div class="card" style="margin-bottom: 24px;">
                <div style="display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 16px; align-items: center; padding: 20px;">
                    <button class="btn-secondary" onclick="changeDate(-1)">← Previous</button>
                    <div style="text-align: center;">
                        <input type="date" class="form-control" id="scheduleDate" onchange="loadSchedule()" style="max-width: 200px; margin: 0 auto;">
                    </div>
                    <button class="btn-secondary" onclick="changeDate(1)">Next →</button>
                    <select class="form-control" id="statusFilter" onchange="loadSchedule()" style="max-width: 150px;">
                        <option value="">All Status</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <button class="btn-secondary" onclick="printSchedule()" title="Print Schedule">🖨️ Print</button>
                </div>
            </div>

            
            <div class="card">
                <div class="card-title">
                    <span>📅 My Training Schedule</span>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Session Type</th>
                                <th>Topic</th>
                                <th>Instructor</th>
                                <th>Location</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleTableBody">
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/dashboard.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script>
        // Store schedules from API
        let schedules = [];

        async function loadSchedule() {
            try {
                console.log('Loading schedule from API...');
                const response = await api.request('/schedule.php');
                
                if (response.success && response.data) {
                    schedules = response.data;
                    renderSchedule();
                } else {
                    utils.showNotification(response.message || 'Failed to load schedule', 'error');
                }
            } catch (error) {
                console.error('Error loading schedule:', error);
                utils.showNotification('Error loading schedule', 'error');
            }
        }

        function renderSchedule() {
            const tbody = document.getElementById('scheduleTableBody');
            const selectedDate = document.getElementById('scheduleDate').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filteredSchedules = schedules;
            
            if (selectedDate) {
                filteredSchedules = filteredSchedules.filter(s => s.session_date.startsWith(selectedDate));
            }
            
            if (statusFilter) {
                filteredSchedules = filteredSchedules.filter(s => s.status === statusFilter);
            }
            
            if (filteredSchedules.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 40px;">No sessions found</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredSchedules.map(s => {
                const dateTime = new Date(s.session_date);
                const date = dateTime.toLocaleDateString();
                const time = dateTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const instructor = s.instructor_name || 'Not assigned';
                
                return `
                    <tr>
                        <td><strong>${date}</strong></td>
                        <td>${time}</td>
                        <td><span class="badge-${s.lesson_type === 'practical' ? 'success' : 'info'}">${s.lesson_type}</span></td>
                        <td>${s.program_name}</td>
                        <td>${instructor}</td>
                        <td>DLSM Center</td>
                        <td><span class="badge-info">${s.status || 'Scheduled'}</span></td>
                        <td>
                            <button class="btn-sm-secondary" onclick="viewDetails(${s.id})">View</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function changeDate(days) {
            const dateInput = document.getElementById('scheduleDate');
            const currentDate = new Date(dateInput.value || new Date());
            currentDate.setDate(currentDate.getDate() + days);
            dateInput.value = currentDate.toISOString().split('T')[0];
            renderSchedule();
        }

        function printSchedule() {
            const table = document.querySelector('.data-table');
            const selectedDate = document.getElementById('scheduleDate').value;
            const printWindow = window.open('', '', 'height=600,width=900');
            
            const title = selectedDate ? `Training Schedule - ${selectedDate}` : 'Training Schedule';
            
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${title}</title>
                    <style>
                        body { font-family: 'Inter', sans-serif; margin: 20px; }
                        h1 { color: #1e293b; margin-bottom: 20px; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th { background: #1E40AF; color: white; padding: 12px; text-align: left; font-weight: 600; }
                        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
                        tr:nth-child(even) { background: #f8fafc; }
                        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
                        .badge-success { background: #dcfce7; color: #15803d; }
                        .badge-info { background: #bfdbfe; color: #1E40AF; }
                        .badge-warning { background: #fef3c7; color: #d97706; }
                        @media print { body { margin: 0; } }
                    </style>
                </head>
                <body>
                    <h1>${title}</h1>
                    <p>Printed on: ${new Date().toLocaleString()}</p>
                    ${table.outerHTML}
                </body>
                </html>
            `);
            
            printWindow.document.close();
            printWindow.print();
        }

        function viewDetails(id) {
            const schedule = schedules.find(s => s.id == id);
            if (schedule) {
                const dateTime = new Date(schedule.session_date);
                const date = dateTime.toLocaleDateString();
                const time = dateTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                Modal.alert({
                    title: 'Session Details',
                    message: `
                        <strong>Topic:</strong> ${schedule.program_name || 'N/A'}<br>
                        <strong>Type:</strong> ${schedule.lesson_type || 'N/A'}<br>
                        <strong>Date:</strong> ${date}<br>
                        <strong>Time:</strong> ${time}<br>
                        <strong>Duration:</strong> ${schedule.duration_minutes ? schedule.duration_minutes + ' mins' : 'Not specified'}<br>
                        <strong>Instructor:</strong> ${schedule.instructor_name || 'Not assigned'}<br>
                        <strong>Location:</strong> DLSM Center<br>
                        <strong>Status:</strong> ${schedule.status || 'Scheduled'}<br>
                        ${schedule.notes ? `<strong>Notes:</strong> ${schedule.notes}` : ''}
                    `,
                    icon: '📅',
                    type: 'info'
                });
            }
        }

        function contactInstructor(id) {
            const schedule = schedules.find(s => s.id == id);
            if (schedule) {
                const instructorName = schedule.instructor_name || 'your instructor';
                const topicName = schedule.program_name || 'your training';
                Modal.confirm({
                    title: 'Contact Instructor',
                    message: `Send a message to ${instructorName}?`,
                    icon: '📧',
                    confirmText: 'Send Email',
                    onConfirm: () => {
                        window.location.href = `mailto:instructor@dlsm.com?subject=Question about ${topicName}`;
                        utils.showNotification('Opening email client...', 'info');
                    }
                });
            }
        }

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('open');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.classList.remove('open');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('DOMContentLoaded', async function() {
            const user = auth.getCurrentUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            document.getElementById('userName').textContent = user.name || 'Student';
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('scheduleDate').value = today;
            
            await loadSchedule();
        });
    </script>
</body>
</html>
