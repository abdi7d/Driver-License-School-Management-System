    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      rel="stylesheet"
    />

  </head>

      </div>
      <nav class="sidebar-nav">

        >
        <a href="programs.html" class="nav-item"
          ><span class="nav-icon">📚</span
          ><span class="nav-text">Programs</span></a
        >
        <a href="enrollments.html" class="nav-item"
          ><span class="nav-icon">📋</span
          ><span class="nav-text">Enrollments</span></a
        >
        <a href="approvals.html" class="nav-item"
          ><span class="nav-icon">✅</span
          ><span class="nav-text">Approvals</span></a
        >
        <a href="exams.html" class="nav-item"
          ><span class="nav-icon">📝</span
          ><span class="nav-text">Exams</span></a
        >
        <a href="certificates.html" class="nav-item"
          ><span class="nav-icon">🎓</span
          ><span class="nav-text">Certificates</span></a
        >
        <a href="reports.html" class="nav-item"
          ><span class="nav-icon">📈</span
          ><span class="nav-text">Reports</span></a
        >
        <a href="notifications.html" class="nav-item active"
          ><span class="nav-icon">🔔</span
          ><span class="nav-text">Notifications</span></a
        >
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" id="logoutBtn">
          <span class="nav-icon">🚪</span><span class="nav-text">Logout</span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
          <div>
            <h1 class="page-title">Notifications</h1>
            <p class="page-subtitle">System alerts and activity updates</p>
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-view" id="markAllBtn">Mark all as read</button>
          <div class="user-profile">
            <div class="user-avatar">👤</div>
            <div class="user-info">
              <span class="user-name" id="userName">Manager</span>
            </div>
          </div>
        </div>
      </header>

      <div class="dashboard-container">
        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="stat-icon">🔔</div>
            <div class="stat-info">
              <p class="stat-label">Total</p>
              <h3 class="stat-value" id="statTotal">8</h3>
            </div>
          </div>
          <div class="stat-card orange">
            <div class="stat-icon">🔴</div>
            <div class="stat-info">
              <p class="stat-label">Unread</p>
              <h3 class="stat-value" id="statUnread">5</h3>
            </div>
          </div>
          <div class="stat-card green">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
              <p class="stat-label">Read</p>
              <h3 class="stat-value" id="statRead">3</h3>
            </div>
          </div>
          <div class="stat-card purple">
            <div class="stat-icon">⚠️</div>
            <div class="stat-info">
              <p class="stat-label">Alerts</p>
              <h3 class="stat-value" id="statAlerts">2</h3>
            </div>
          </div>
        </div>

        <div class="tabs tabs-mt">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="unread">Unread</button>
          <button class="tab-btn" data-filter="approval">Approvals</button>
          <button class="tab-btn" data-filter="exam">Exams</button>
          <button class="tab-btn" data-filter="system">System</button>
        </div>

        <div class="card" id="notifList"></div>
      </div>
    </main>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script>
      let notifications = [];
      let activeFilter = "all";

      function formatRelativeTime(timestamp) {
        if (!timestamp) return "Just now";
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        if (diffMins < 1) return "Just now";
        if (diffMins < 60) return `${diffMins} min ago`;
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24)
          return `${diffHours} hour${diffHours > 1 ? "s" : ""} ago`;
        const diffDays = Math.floor(diffHours / 24);
        return `${diffDays} day${diffDays > 1 ? "s" : ""} ago`;
      }

      function normalizeNotification(notification) {
        return {
          id: notification.id,
          type: notification.type || "system",
          icon: notification.icon || "🔔",
          title: notification.title,
          message: notification.message,
          time: formatRelativeTime(
            notification.created_at || notification.time,
          ),
          read: notification.is_read === 1 || notification.read === true,
          link: notification.link || "#",
        };
      }

      function renderNotifications() {
        const list = document.getElementById("notifList");
        const filtered = notifications.filter((n) => {
          if (activeFilter === "all") return true;
          if (activeFilter === "unread") return !n.read;
          return n.type === activeFilter;
        });

        if (filtered.length === 0) {
          list.innerHTML =
            '<div class="empty-state"><div class="empty-icon">🔔</div><p>No notifications found</p></div>';
          return;
        }

        list.innerHTML = filtered
          .map(
            (n) => `
                <div class="notif-item ${n.read ? "notif-read" : "notif-unread"}" data-id="${n.id}">
                    <div class="notif-icon-wrap ${n.read ? "" : "notif-icon-active"}">${n.icon}</div>
                    <div class="notif-content">
                        <div class="notif-header">
                            <h4 class="notif-title">${n.title}</h4>
                            ${!n.read ? '<span class="notif-dot"></span>' : ""}
                        </div>
                        <p class="notif-message">${n.message}</p>
                        <span class="notif-time">${n.time}</span>
                    </div>
                    <div class="notif-actions">
                        <a href="${n.link}" class="btn-view">View</a>
                        ${!n.read ? `<button class="btn-sm-approve" onclick="markRead(${n.id})">Mark read</button>` : ""}
                    </div>
                </div>
            `,
          )
          .join("");

        updateStats();
      }

      async function markRead(id) {
        const notification = notifications.find((x) => x.id === id);
        if (!notification || notification.read) return;

        try {
          const response = await api.put("/manager/notifications", { id });
          if (response.success) {
            notification.read = true;
            renderNotifications();
          }
        } catch (error) {
          console.error("Failed to mark notification read:", error);
        }
      }

      async function markAllRead() {
        const unread = notifications.filter((n) => !n.read);
        await Promise.all(
          unread.map((n) => api.put("/manager/notifications", { id: n.id })),
        );
        notifications = notifications.map((n) => ({ ...n, read: true }));
        renderNotifications();
      }

      function updateStats() {
        const unread = notifications.filter((n) => !n.read).length;
        const alerts = notifications.filter((n) => n.type === "system").length;
        document.getElementById("statTotal").textContent = notifications.length;
        document.getElementById("statUnread").textContent = unread;
        document.getElementById("statRead").textContent =
          notifications.length - unread;
        document.getElementById("statAlerts").textContent = alerts;
      }

      document.addEventListener("DOMContentLoaded", async function () {
        const user = auth.getCurrentUser();
        if (!user) {
          window.location.href = "../login.html";
          return;
        }
        document.getElementById("userName").textContent =
          user.name || "Manager";

        // Load notifications from API
        try {
          const response = await api.get("/manager/notifications");
          if (response.success && Array.isArray(response.data)) {
            notifications = response.data.map(normalizeNotification);
          } else {
            console.error(
              "Unable to load notifications:",
              response.message || response,
            );
          }
        } catch (error) {
          console.error("Error loading notifications:", error);
        }

        renderNotifications();

        document
          .getElementById("logoutBtn")
          .addEventListener("click", () => auth.logout());

        // Filter tabs
        document.querySelectorAll(".tab-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            document
              .querySelectorAll(".tab-btn")
              .forEach((b) => b.classList.remove("active"));
            this.classList.add("active");
            activeFilter = this.dataset.filter;
            renderNotifications();
          });
        });

        // Mark all read
        document
          .getElementById("markAllBtn")
          .addEventListener("click", markAllRead);
      });
    </script>
  </body>
</html>
